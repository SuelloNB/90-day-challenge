<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Styling Lists and Links</title>
    <link rel="stylesheet" href="/CSS/Basic CSS/Styling List and Links/styles.css">
</head>
<body>
    <h1>Styling Lists and Links</h1>

    <!--Spacing List Items Using Margin or Line-Height-->
    <!--Spacing List Using Margin-->
    <div class="spacing-list-item-using-margins">
        <h2>Spacing List Item Using Margin or Line-Height</h2>
        <ul>
            <li>Item 1</li>
            <li>Item 2</li>
            <li>Item 3</li>
        </ul>
        <pre>
            <code>
/*Spacing list using margins*/
.spacing-list-item-using-margins li{
    margin-bottom: 40px; /*sets the bottom margin to 40px*/
}              
            </code>
        </pre>
    </div>
</body>
